[phases.setup]
nixPkgs = [
  "php",
  "phpExtensions.bcmath",
  "phpExtensions.gd",
  "composer",
  "nodejs"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-bcmath --ignore-platform-req=ext-gd",
  "npm install"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"