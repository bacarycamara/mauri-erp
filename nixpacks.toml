[phases.setup]
nixPkgs = ["php82", "php82Extensions.bcmath", "php82Extensions.gd", "composer", "nodejs"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-bcmath --ignore-platform-req=ext-gd"
]

[phases.build]
cmds = [
  "npm install",
  "npm run build"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"