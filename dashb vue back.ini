<script>
const monthLabels = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'];

@if($isAdmin || $isGestionnaire || $isCaissier || $isComptable)
const salesData   = @json($salesChart ?? []);
const salesValues = monthLabels.map((_, i) => salesData[i + 1] ?? 0);
new Chart(document.getElementById('salesChart'), {
    type: 'line',
    data: {
        labels: monthLabels,
        datasets: [{
            label: 'Ventes',
            data: salesValues,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.1)',
            fill: true,
            tension: 0.4,
            pointBackgroundColor: '#3b82f6',
            pointRadius: 4,
        }]
